name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install bandit pip-audit detect-secrets
      - name: SAST (NIST SI-10)
        run: bandit -c pyproject.toml -r agent/ pipeline/ api/
      - name: Dependency scan (NIST SI-2)
        run: pip-audit
      - name: Secret detection (NIST IA-5)
        run: detect-secrets scan --baseline .secrets.baseline

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - run: mypy agent/ pipeline/ api/ --strict

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage gate
        run: pytest tests/ --cov=agent --cov=pipeline --cov=api --cov-fail-under=80

  prompt-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Verify prompt hashes (ADR-008 / NIST CM-3)
        run: python scripts/check_prompts.py

  eval-smoke:
    runs-on: ubuntu-latest
    needs: [lint, security, types, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - name: Eval smoke run (behavioral regression gate)
        run: |
          python eval/run_eval.py --questions eval/golden_questions_smoke.json
          python scripts/check_eval_thresholds.py \
            --max-incorrect-refusal 0.40 \
            --max-p95-latency 30000
