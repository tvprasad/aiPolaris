repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        # Catches: hardcoded passwords, weak crypto, subprocess injection (NIST SI-10)

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        # Blocks: API keys, connection strings, tokens in any staged file (NIST IA-5)

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic>=2.7.0]

  - repo: local
    hooks:
      - id: prompt-integrity
        name: Prompt hash check (ADR-008)
        language: python
        entry: python scripts/check_prompts.py
        pass_filenames: false
        always_run: true
        # Fails if agent/prompts/ changed without prompts.lock update + ADR bump

      - id: no-hardcoded-endpoints
        name: GCCH endpoint check (ADR-009)
        language: python
        entry: python scripts/check_endpoints.py
        pass_filenames: true
        types: [python]
        # Fails if any .py file contains hardcoded Azure endpoint strings
